<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--color-background); font-family: var(--font-sans); color: var(--color-foreground); }
  .wrap { padding: var(--space-2xl); display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-2xl); align-items: start; }
  .stack { display: flex; flex-direction: column; gap: var(--space-lg); }
  .stats { display: flex; gap: var(--space-md); }
</style>
</head>
<body>
<div id="root" class="wrap"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { RolodexCard, SessionStat, NotificationRow, Card, Button, OutlinedField } = window.LandlineDesignSystem_b5634b;
  function Demo() {
    return (
      <>
        <RolodexCard title="Sign In">
          <div style={{ display:'flex', flexDirection:'column', gap:'var(--space-lg)' }}>
            <OutlinedField label="Phone" placeholder="(555) 012-3456" value="" onChange={()=>{}} />
            <Button label="Continue" fullWidth />
          </div>
        </RolodexCard>
        <div className="stack">
          <div className="stats">
            <SessionStat label="Time Remaining" value="42m" tone="primary" style={{ flex:1 }} />
            <SessionStat label="Notifications" value={12} tone="secondary" style={{ flex:1 }} />
          </div>
          <Card variant="base" padding="none">
            <NotificationRow appName="WhatsApp" title="Mom" text="Call me when you're free 💚" time="3m ago" showAvatar divider />
            <NotificationRow appName="Slack" title="#design" text="Ship it!" time="12m ago" showAvatar autoReplied />
          </Card>
        </div>
      </>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
